name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
      with:
        python-version: "3.12"

    - name: Install lint tools
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-test.txt
        # mypy's type-check contract here was validated against numpy 1.x
        # stubs; numpy 2.x ships stricter shape/dtype stubs that surface
        # unrelated errors. Pin the lint env only — runtime stays unpinned.
        pip install "numpy<2"

    - name: Ruff
      run: ruff check .

    - name: Mypy
      # Post-#119 the implementation lives in porosity_fe/; the legacy
      # `porosity_fe_analysis.py` is now a 62-line shim. Check the package.
      run: mypy porosity_fe porosity_fe_analysis.py

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-test.txt

    - name: Run tests
      run: pytest tests/ -v --tb=short

    - name: Smoke-test Streamlit app imports
      run: python -c "import app; print('app imports OK')"
